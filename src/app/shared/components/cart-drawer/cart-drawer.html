@if(layout.cartOpened()){

<div class="drawer-backdrop"
     (click)="layout.closeCart()">

    <div class="drawer"
         (click)="$event.stopPropagation()">

        <div class="drawer-header">

            <h3>Shopping Cart</h3>

            <button class="close-btn"
                (click)="layout.closeCart()">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <div class="drawer-body">

            @if(cartService.items().length === 0){
              <p class="empty-cart">Your cart is empty.</p>
            } @else {
              <div class="cart-items">
                @for(item of cartService.items(); track item.product.id){
                  <div class="cart-item">
                    <img [src]="item.product.image" [alt]="item.product.name" class="item-image">
                    <div class="item-details">
                      <h4>{{ item.product.name }}</h4>
                      <p class="item-price">{{ item.product.price }} EGP</p>
                      <div class="item-quantity">
                        <button class="qty-btn" (click)="cartService.updateQuantity(item.product.id, item.quantity - 1)">
                          <i class="bi bi-dash"></i>
                        </button>
                        <span class="qty-value">{{ item.quantity }}</span>
                        <button class="qty-btn" (click)="cartService.updateQuantity(item.product.id, item.quantity + 1)">
                          <i class="bi bi-plus"></i>
                        </button>
                      </div>
                      <button class="remove-btn" (click)="cartService.removeItem(item.product.id)">
                        <i class="bi bi-trash3"></i> Remove
                      </button>
                    </div>
                  </div>
                }
              </div>
              <div class="drawer-footer">
                <div class="cart-total">
                  <span>Total:</span>
                  <strong>{{ cartService.total() }} EGP</strong>
                </div>
                <button class="checkout-btn">Checkout</button>
              </div>
            }

        </div>

    </div>

</div>

}
