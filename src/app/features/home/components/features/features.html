<section class="features" id="features">

    <div class="container-custom">

        <div class="row">

            @for(item of items();track item.title){

                <div class="col-lg-3 col-md-6">

                    <div class="feature">

                        <i class="bi {{item.icon}}"></i>

                        <h4>

                            {{item.title}}

                        </h4>

                        <p>

                            {{item.desc}}

                        </p>

                    </div>

                </div>

            }

        </div>

    </div>

</section>
